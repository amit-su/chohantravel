version: '3.8'

services:
  nginx:
    image: nginx:latest
    container_name: chohan_nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf # Mount the custom main Nginx config
      - ./nginx/conf.d:/etc/nginx/conf.d
      - ./dist:/usr/share/nginx/html
      - /etc/letsencrypt:/etc/letsencrypt # SSL mapping
    depends_on:
      - frontend
      - backend
    networks:
      - app-network

  frontend:
    image: node:18-alpine
    container_name: chohan_frontend
    working_dir: /app
    volumes:
      - ./frontend_chohan:/app
      - ./dist:/app/dist        # <-- shared build folder
    command: sh -c "npm install --legacy-peer-deps && npm run build"
    networks:
      - app-network
  backend:
    image: node:18-alpine
    container_name: chohan_backend
    working_dir: /api
    volumes:
      - ./api_chohan:/api
    command: sh -c "npm install  && npm start"
    ports:
      - "5000:5000"
    expose:
      - "5000"
    env_file:
      - ./api_chohan/.env
    networks:
      - app-network

  db:
    image: "mcr.microsoft.com/mssql/server:2019-latest"
    environment:
      ACCEPT_EULA: "Y"
      SA_PASSWORD: "Password123"
    ports:
      - "1433:1433"
    networks:
      - app-network
    volumes:
      - ./mssql:/var/opt/mssql
      - ./mssql_init:/tmp

networks:
  app-network:
    driver: bridge
