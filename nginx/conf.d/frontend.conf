server {
    listen 80;
    server_name app.chohantoursandtravels.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name app.chohantoursandtravels.com;

    ssl_certificate /etc/letsencrypt/live/app.chohantoursandtravels.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/app.chohantoursandtravels.com/privkey.pem;

    root /usr/share/nginx/html/frontend_chohan;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }
}