server {
    listen 80;
    server_name api.chohantoursandtravels.com;

    # Redirect everything to HTTPS
    return 301 https://$host$request_uri;
}
server {
    listen 443 ssl;
    server_name api.chohantoursandtravels.com;

    # SSL Certificates
    ssl_certificate /etc/letsencrypt/live/api.chohantoursandtravels.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.chohantoursandtravels.com/privkey.pem;

    # Strong SSL security (recommended)
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    # Proxy to backend container
    location / {
        proxy_pass http://backend:5000;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_http_version 1.1;
        proxy_set_header Connection "";

        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }
}