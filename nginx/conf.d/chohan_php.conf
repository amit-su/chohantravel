# Redirect all HTTP to HTTPS
server {
    listen 80;
    server_name chohantoursandtravels.com www.chohantoursandtravels.com;
    return 301 https://chohantoursandtravels.com$request_uri;
}

# Redirect www HTTPS to non-www HTTPS
server {
    listen 443 ssl;
    server_name www.chohantoursandtravels.com;

    ssl_certificate /etc/letsencrypt/live/chohantoursandtravels.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/chohantoursandtravels.com/privkey.pem;

    return 301 https://chohantoursandtravels.com$request_uri;
}

# Main HTTPS server for non-www
server {
    listen 443 ssl;
    server_name chohantoursandtravels.com;

    ssl_certificate /etc/letsencrypt/live/chohantoursandtravels.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/chohantoursandtravels.com/privkey.pem;

    resolver 127.0.0.11 valid=30s;
    set $php_upstream chohan_php;
    location / {
        proxy_pass http://$php_upstream:80;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }
}
