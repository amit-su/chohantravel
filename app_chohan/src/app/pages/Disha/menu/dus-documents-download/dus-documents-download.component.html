<div class="h-screen bg-surface-ground flex flex-col">
    <!-- ================= HEADER / SEARCH (FIXED) ================= -->
    <div class="sticky top-0 z-20 bg-surface-card border-b border-surface-border shadow-sm">
        <div class="px-4 py-4 flex flex-col gap-3">
            <p-autoComplete
                [(ngModel)]="selectedBus"
                [suggestions]="filteredBuses"
                (completeMethod)="filterBus($event)"
                (onSelect)="onBusSelect($event)"
                field="busNo"
                [dropdown]="true"
                dataKey="id"
                [forceSelection]="true"
                placeholder="Search bus number"
                styleClass="w-full"
                inputStyleClass="
          w-full
          px-4 py-3
          text-base
          rounded-2xl
          border border-gray-300
          focus:border-primary
          focus:ring-2 focus:ring-primary/20
        "
            >
            </p-autoComplete>
        </div>
    </div>

    <!-- ================= SCROLLABLE CONTENT ================= -->
    <div class="flex-1 overflow-y-auto mb-40">
        <!-- DOCUMENT LIST -->
        <div *ngIf="documents.length > 0" class="px-4 py-4 space-y-4">
            <div *ngFor="let doc of documents">
                <p-card styleClass="rounded-2xl shadow-sm">
                    <!-- Header -->
                    <div class="flex justify-between items-start">
                        <div>
                            <p class="text-base font-semibold text-primary">
                                {{ doc.doctype }}
                            </p>
                            <p *ngIf="doc.TaskName && doc.TaskName !== 'undefined'" class="text-sm text-gray-500 mt-0.5">
                                {{ doc.TaskName }}
                            </p>
                        </div>

                        <p-button *ngIf="doc.DocumentPath" icon="pi pi-download" severity="primary" [rounded]="true" (onClick)="downloadDocument(doc)" pTooltip="Download" tooltipPosition="bottom"> </p-button>
                    </div>

                    <p-divider></p-divider>

                    <!-- Info -->
                    <div class="grid grid-cols-2 gap-3 text-sm">
                        <div>
                            <p class="text-xs font-semibold text-gray-500 uppercase">Expiry Date</p>
                            <p class="font-medium text-gray-900">
                                {{ doc.ExpiryDate | date: 'dd MMM yyyy' }}
                            </p>
                        </div>

                        <div>
                            <p class="text-xs font-semibold text-gray-500 uppercase">Next Due</p>
                            <p class="font-medium text-gray-900">
                                {{ doc.NextDueDate | date: 'dd MMM yyyy' }}
                            </p>
                        </div>

                        <div class="col-span-2 mt-2">
                            <div class="flex items-center gap-2 bg-blue-50 px-3 py-2 rounded-xl">
                                <i class="pi pi-bell text-blue-500 text-sm"></i>
                                <span class="text-blue-700 text-sm">
                                    Intimate in
                                    <strong>{{ doc.IntimateDays }} days</strong>
                                </span>
                            </div>
                        </div>
                    </div>
                </p-card>
            </div>
        </div>

        <!-- EMPTY STATE -->
        <div *ngIf="selectedBus && documents.length === 0" class="px-6 mt-20 text-center">
            <div class="bg-surface-card rounded-3xl shadow-sm p-8">
                <div class="w-20 h-20 mx-auto mb-4 flex items-center justify-center rounded-full bg-gray-100">
                    <i class="pi pi-file-excel text-4xl text-gray-400"></i>
                </div>

                <h3 class="text-base font-semibold text-gray-900">No Documents Found</h3>

                <p class="text-sm text-gray-600 mt-2">
                    No documents available for
                    <span class="font-semibold text-primary">
                        {{ selectedBus.busNo }}
                    </span>
                </p>
            </div>
        </div>
    </div>
</div>
