<div class="aurora-dashboard scrollable-container">
    <!-- Moving Blobs -->
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
    <div class="blob blob-3"></div>
    <div class="blob blob-4"></div>

    <main class="main-content max-w-7xl mx-auto py-12">
        <!-- Dashboard Grid -->
        <div class="unique-grid">
            <!-- Trip List -->
            <div *ngIf="canReadBooking" class="bubble-card" (click)="selectCard('bookingList')" 
                style="--icon-start: #818cf8; --icon-end: #6366f1; --hover-shadow: rgba(129, 140, 248, 0.2);">
                <div class="icon-circle">
                    <i class="pi pi-list"></i>
                </div>
                <h3 class="card-title">Booking List</h3>
                <p class="card-desc">Review trip history.</p>
            </div>

            <!-- Attendance -->
            <div *ngIf="canReadAttendance" class="bubble-card" (click)="selectCard('attendence')"
                style="--icon-start: #fb923c; --icon-end: #f97316; --hover-shadow: rgba(251, 146, 60, 0.2);">
                <div class="icon-circle">
                    <i class="pi pi-user-edit"></i>
                </div>
                <h3 class="card-title">Attendance</h3>
                <p class="card-desc">Staff daily logs.</p>
            </div>

            <!-- Documents -->
            <div class="bubble-card" (click)="selectCard('documents')"
                style="--icon-start: #60a5fa; --icon-end: #3b82f6; --hover-shadow: rgba(96, 165, 250, 0.2);">
                <div class="icon-circle">
                    <i class="pi pi-file-pdf"></i>
                </div>
                <h3 class="card-title">Bus Papers</h3>
                <p class="card-desc">Access fleet docs.</p>
            </div>
            
            <!-- Khoraki Details -->
            <div class="bubble-card" (click)="selectCard('khoraki')"
                style="--icon-start: #f43f5e; --icon-end: #e11d48; --hover-shadow: rgba(244, 63, 94, 0.2);">
                <div class="icon-circle">
                    <i class="pi pi-money-bill"></i>
                </div>
                <h3 class="card-title">Khoraki Details</h3>
                <p class="card-desc">Driver & helper reports.</p>
            </div>
        </div>
    </main>
</div>
