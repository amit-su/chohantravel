<div class="relative w-full h-full layout-wrapper" [ngClass]="containerClass">
    <app-topbar *ngIf="isNotLoginPage"></app-topbar>
    <app-sidebar *ngIf="isNotLoginPage && !isprod"></app-sidebar>

    <div class="relative w-full h-full bg-white/90">
        <div class="w-full h-full absolute top-[60px]">
            <div class="relative w-full h-full" style="padding-bottom: 64px">
                <router-outlet></router-outlet>
            </div>
        </div>
    </div>

    <div class="layout-mask animate-fadein"></div>

    <!-- Bottom Navbar -->
    <div *ngIf="isNotLoginPage" class="w-full h-[64px] absolute bottom-0">
        <div class="fixed bottom-0 left-0 z-50 w-full h-16 bg-white border-t border-gray-200 dark:bg-gray-700 dark:border-gray-600">
            <div class="flex items-center justify-around w-full h-full font-medium text-center">
                <!-- Home/Menu Button -->
                <button type="button" class="flex flex-col items-center justify-center flex-1 h-full hover:bg-gray-100 dark:hover:bg-gray-800 group" [ngClass]="{ 'text-primary dark:text-primary': isActive('/') }" (click)="navigate('/')">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="currentColor" viewBox="0 0 16 16" class="mb-1">
                        <path
                            d="M1.5 0A1.5 1.5 0 0 0 0 1.5v2A1.5 1.5 0 0 0 1.5 5h13A1.5 1.5 0 0 0 16 3.5v-2A1.5 1.5 0 0 0 14.5 0zm1 2h3a.5.5 0 0 1 0 1h-3a.5.5 0 0 1 0-1m9.927.427A.25.25 0 0 1 12.604 2h.792a.25.25 0 0 1 .177.427l-.396.396a.25.25 0 0 1-.354 0zM0 8a2 2 0 0 1 2-2h12a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2H2a2 2 0 0 1-2-2zm1 3v2a1 1 0 0 0 1 1h12a1 1 0 0 0 1-1v-2zm14-1V8a1 1 0 0 0-1-1H2a1 1 0 0 0-1 1v2zM2 8.5a.5.5 0 0 1 .5-.5h9a.5.5 0 0 1 0 1h-9a.5.5 0 0 1-.5-.5m0 4a.5.5 0 0 1 .5-.5h6a.5.5 0 0 1 0 1h-6a.5.5 0 0 1-.5-.5"
                        />
                    </svg>
                    <span class="text-xs text-gray-500 dark:text-gray-400 group-hover:text-primary">Menu</span>
                </button>

                <!-- Profile Button -->
                <button
                    type="button"
                    class="flex flex-col items-center justify-center flex-1 h-full hover:bg-gray-100 dark:hover:bg-gray-800 group"
                    [ngClass]="{ 'text-primary dark:text-primary': isActive('/pages/profile') }"
                    (click)="navigate('/pages/profile')"
                >
                    <svg class="w-5 h-5 mb-1 text-gray-500 dark:text-gray-400 group-hover:text-primary" aria-hidden="true" xmlns="http://www.w3.org/2000/svg" fill="currentColor" viewBox="0 0 20 20">
                        <path d="M10 0a10 10 0 1 0 10 10A10.011 10.011 0 0 0 10 0Zm0 5a3 3 0 1 1 0 6 3 3 0 0 1 0-6Zm0 13a8.949 8.949 0 0 1-4.951-1.488A3.987 3.987 0 0 1 9 13h2a3.987 3.987 0 0 1 3.951 3.512A8.949 8.949 0 0 1 10 18Z" />
                    </svg>
                    <span class="text-xs text-gray-500 dark:text-gray-400 group-hover:text-primary">Profile</span>
                </button>

                <!-- Add more buttons here using the same layout -->
            </div>
        </div>
    </div>
</div>
