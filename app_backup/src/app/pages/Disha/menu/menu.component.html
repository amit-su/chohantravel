<div class="flex h-full p-6 bg-gradient-to-br from-blue-50 to-sky-100 scrollable-container">
    <div class="w-full h-full max-w-md mx-auto">
        <h1 class="mb-8 text-2xl font-bold text-center text-transparent bg-clip-text bg-gradient-to-r from-blue-600 to-sky-500 sm:text-3xl md:text-4xl">Choose Your Module</h1>

        <div class="grid grid-cols-1 gap-6 sm:grid-cols-2 md:grid-cols-3">
            <!-- Attendance Card -->
            <p-card
                class="relative flex flex-col items-center justify-center p-6 transition-all duration-300 transform bg-white border border-gray-200 cursor-pointer rounded-xl hover:scale-[1.03] hover:shadow-lg hover:border-blue-300 group overflow-hidden"
                (click)="selectCard('attendence')"
            >
                <!-- Background effect -->
                <div class="absolute inset-0 transition-opacity duration-300 opacity-0 bg-gradient-to-br from-blue-50 to-sky-100 group-hover:opacity-100"></div>

                <div class="relative z-10 flex flex-col items-center">
                    <!-- Icon with floating effect -->
                    <div class="p-4 mb-4 transition-all duration-500 transform bg-blue-100 rounded-full group-hover:rotate-6 group-hover:bg-blue-200">
                        <i class="text-4xl text-blue-600 pi pi-user-edit"></i>
                    </div>

                    <!-- Title with animated underline -->
                    <p class="mb-2 text-lg font-semibold text-gray-800">Attendance</p>
                    <div class="w-8 h-1 transition-all duration-300 transform scale-x-0 bg-blue-500 rounded-full group-hover:scale-x-100"></div>

                    <!-- Subtle description -->
                    <p class="mt-2 text-xs text-center text-gray-500">Track and manage driver helper attendance</p>
                </div>

                <!-- Glow effect on hover -->
                <div class="absolute inset-0 opacity-0 rounded-xl group-hover:opacity-100 group-hover:bg-blue-100/10 group-hover:border group-hover:border-blue-200/50"></div>
            </p-card>
        </div>
    </div>
</div>
