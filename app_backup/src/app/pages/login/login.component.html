<!-- <div class="flex items-center justify-center min-h-screen px-4"> -->
<div class="flex items-center justify-center w-full h-[550px] sm:h-[450px] md:h-[500px] lg:h-[550px] px-4">
    <div class="w-full max-w-md px-6 py-8 mt-2 bg-white/90 rounded-xl">
        <!-- Logo & Title -->
        <div class="flex flex-col items-center mb-10">
            <div class="flex items-center justify-center mb-2">
                <img src="assets/image/logo-black-new.png" alt="Logo" class="object-contain h-24 w-28" />
            </div>
            <h1 class="m-0 text-3xl font-bold text-center text-red-600"><span class="text-black">CHOHAN</span> TOURS & TRAVELS</h1>
            <p class="mt-1 text-sm text-gray-600">Journey Beyond Imagination</p>
        </div>

        <!-- Login Form -->
        <form class="w-full" *ngIf="userFrom" [formGroup]="userFrom">
            <div class="flex flex-col w-full space-y-5">
                <!-- Mobile -->
                <div>
                    <label for="mobile" class="block mb-1 text-sm font-medium text-gray-700">User Name</label>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 flex items-center pl-3">
                            <i class="text-gray-500 pi pi-user"></i>
                        </div>
                        <input
                            id="mobile"
                            type="text"
                            placeholder="Enter User Name"
                            formControlName="username"
                            class="w-full p-3 pl-10 transition border border-gray-300 rounded-lg focus:ring-2 focus:ring-amber-500 focus:border-amber-500 focus:outline-none"
                        />
                    </div>
                </div>

                <!-- Password -->
                <div>
                    <label for="password" class="block mb-1 text-sm font-medium text-gray-700">Password</label>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 flex items-center pl-3">
                            <i class="text-gray-500 pi pi-lock"></i>
                        </div>
                        <input
                            id="password"
                            [type]="passwordVisible ? 'text' : 'password'"
                            placeholder="Enter password"
                            formControlName="password"
                            class="w-full p-3 pl-10 pr-10 transition border border-gray-300 rounded-lg focus:ring-2 focus:ring-amber-500 focus:border-amber-500 focus:outline-none"
                        />
                        <button type="button" (click)="togglePasswordVisibility()" class="absolute inset-y-0 right-0 flex items-center pr-3 text-gray-500 hover:text-amber-600">
                            <i class="pi" [class.pi-eye]="!passwordVisible" [class.pi-eye-slash]="passwordVisible"></i>
                        </button>
                    </div>
                </div>

                <!-- Remember Me -->
                <div class="flex items-center justify-between">
                    <label class="inline-flex items-center text-sm text-gray-700">
                        <input type="checkbox" class="w-4 h-4 border-gray-300 rounded text-amber-600 focus:ring-amber-500" />
                        <span class="ml-2">Remember me</span>
                    </label>
                </div>

                <!-- Login Button -->
                <button type="button" (click)="onSubmit()" class="w-full px-4 py-3 text-lg font-medium text-white transition bg-red-500 rounded-lg shadow hover:from-amber-600 hover:to-amber-700 focus:ring-2 focus:ring-amber-500 focus:ring-offset-2">
                    Login
                </button>
            </div>
        </form>
    </div>
</div>
